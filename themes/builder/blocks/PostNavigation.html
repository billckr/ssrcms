{% if prev_post or next_post %}
<div class="blk-post-nav" style="
  background: {{ block_config.bgColor | default(value='#ffffff') }};
  padding: {{ block_config.padding | default(value='24px 40px') }};
  box-sizing: border-box;
  width: 100%;
">
  <div style="
    max-width: 800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: {% if next_post and prev_post %}1fr 1fr{% else %}1fr{% endif %};
    gap: 16px;
  ">

    {% if next_post %}
    <a href="{{ next_post.url | safe }}" style="
      background: {{ block_config.cardBgColor | default(value='#f9fafb') }};
      border: 1px solid {{ block_config.borderColor | default(value='#e5e7eb') }};
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      display: block;
    ">
      {% if block_config.showLabels != false %}
      <div style="color: {{ block_config.labelColor | default(value='#6b7280') }}; font-size: 12px; margin-bottom: 6px;">
        ← Previous Post
      </div>
      {% endif %}
      <div style="
        color: {{ block_config.titleColor | default(value='#111827') }};
        font-weight: 600;
        font-size: 15px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      ">{{ next_post.title }}</div>
    </a>
    {% endif %}

    {% if prev_post %}
    <a href="{{ prev_post.url | safe }}" style="
      background: {{ block_config.cardBgColor | default(value='#f9fafb') }};
      border: 1px solid {{ block_config.borderColor | default(value='#e5e7eb') }};
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      display: block;
      text-align: right;
    ">
      {% if block_config.showLabels != false %}
      <div style="color: {{ block_config.labelColor | default(value='#6b7280') }}; font-size: 12px; margin-bottom: 6px;">
        Next Post →
      </div>
      {% endif %}
      <div style="
        color: {{ block_config.titleColor | default(value='#111827') }};
        font-weight: 600;
        font-size: 15px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      ">{{ prev_post.title }}</div>
    </a>
    {% endif %}

  </div>
</div>
{% endif %}
