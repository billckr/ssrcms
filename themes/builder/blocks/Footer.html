{% set cols = block_config.columns | default(value=1) | int %}
<footer class="blk-footer" style="
  background: {{ block_config.bgColor | default(value='#1a1a2e') }};
  padding: {{ block_config.padding | default(value='32px 40px') }};
  box-sizing: border-box;
  width: 100%;
  border-top: 1px solid rgba(255,255,255,0.08);
  {% if block_config.fixed %}position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;{% endif %}
">
  <div style="
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat({{ cols }}, 1fr);
    gap: {{ block_config.gap | default(value='24px') }};
    min-height: 40px;
  ">
    {% for i in range(end=cols) %}
    {% set zone_key = "col" ~ i %}
    <div>
      {{ zone_html[zone_key] | default(value='') | safe }}
    </div>
    {% endfor %}
  </div>
</footer>
