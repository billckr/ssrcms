{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ site.name }}{% endblock title %}

{% block content %}
<article class="single-page">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
  </header>

  <div class="page-content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
