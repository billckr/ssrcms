<div style="
  padding: {{ block_config.padding | default(value='32px 40px') }};
  box-sizing: border-box;
  width: 100%;
">
  <form action="/search" method="GET" style="max-width: 600px; margin: 0 auto; display: flex; gap: 8px;">
    <input
      type="text"
      name="q"
      placeholder="Search…"
      style="
        flex: 1; padding: 10px 16px; font-size: 15px;
        color: {{ block_config.fieldTextColor | default(value='#111827') }};
        background: {{ block_config.fieldBgColor | default(value='#ffffff') }};
        border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;
      "
    />
    <button type="submit" style="
      padding: 10px 20px;
      background: {{ block_config.buttonColor | default(value='#2563eb') }};
      color: #fff; border: none; border-radius: 6px;
      font-weight: 600; cursor: pointer; font-size: 15px; white-space: nowrap;
    ">{{ block_config.label | default(value='Search') }}</button>
  </form>
</div>
