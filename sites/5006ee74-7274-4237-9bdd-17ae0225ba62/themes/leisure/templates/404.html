{% extends "base.html" %}

{% block title %}Page Not Found — {{ site.name }}{% endblock title %}

{% block content %}
<div class="container">
  <section class="error-page">
    <p class="error-code">404</p>
    <h1>Page Not Found</h1>
    <p>The page at <code>{{ request.path }}</code> could not be found.</p>
    <a href="/" class="btn">← Back to Home</a>
  </section>
</div>
{% endblock content %}
