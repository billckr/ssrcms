[plugin]
name        = "seo"
version     = "1.0.0"
api_version = "1"
description = "SEO meta tags, canonical URLs, Open Graph, JSON-LD structured data, and XML sitemap."
author      = "Synaptic Signals"

[hooks]
head_end = "seo/meta.html"

[meta_fields]
seo_title       = { label = "SEO Title",       type = "text",     description = "Override the <title> element. Leave blank to use the post title." }
seo_description = { label = "Meta Description", type = "textarea", description = "Override the meta description. Leave blank to use the excerpt." }
seo_noindex     = { label = "No Index",         type = "boolean",  description = "Prevent search engines from indexing this page." }

[routes]
"/sitemap.xml" = { template = "seo/sitemap.xml", content_type = "application/xml" }
