{% set count = block_config.cards | length %}
<div class="blk-cards" style="
  padding: {{ block_config.padding | default(value='32px 40px') }};
  box-sizing: border-box;
  width: 100%;
">
  <div style="
    display: grid;
    grid-template-columns: repeat({{ count }}, 1fr);
    gap: {{ block_config.gap | default(value='24px') }};
    max-width: 1200px;
    margin: 0 auto;
  ">
    {% for card in block_config.cards %}
    {% set zone_key = "col" ~ loop.index0 %}
    {% set bw = card.borderWidth | default(value='1px') %}
    <div style="
      background: {{ card.bgColor | default(value='#ffffff') }};
      color: {{ card.textColor | default(value='#111827') }};
      border-radius: {{ card.radius | default(value='12px') }};
      {% if bw != '0px' %}border: {{ bw }} solid {{ card.borderColor | default(value='#e2e8f0') }};{% endif %}
      padding: 24px;
      min-height: 160px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: {{ card.valign | default(value='flex-start') }};
    ">
      {{ zone_html[zone_key] | default(value='') | safe }}
    </div>
    {% endfor %}
  </div>
</div>
