<div class="blk-columns" style="
  background: {{ block_config.bgColor | default(value='#ffffff') }};
  padding: {{ block_config.padding | default(value='32px 40px') }};
  box-sizing: border-box;
  width: 100%;
">
  <div style="
    display: grid;
    grid-template-columns: repeat({{ block_config.columns | length }}, 1fr);
    gap: {{ block_config.gap | default(value='24px') }};
    max-width: 1200px;
    margin: 0 auto;
  ">
    {% for col in block_config.columns %}
    {% set zone_key = "col" ~ loop.index0 %}
    <div style="
      {% if col.bgColor and col.bgColor != 'transparent' %}background: {{ col.bgColor }};{% endif %}
      min-height: 80px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: {{ col.valign | default(value='flex-start') }};
    ">
      {{ zone_html[zone_key] | default(value='') | safe }}
    </div>
    {% endfor %}
  </div>
</div>
